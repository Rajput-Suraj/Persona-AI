services:
  - type: web
    name: persona-ai-chat
    env: node
    buildCommand: NODE_ENV=development npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
